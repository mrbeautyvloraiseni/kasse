<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Quittung – MR Beauty</title>
<style>
@font-face{font-family:"MontserratLocal";src:url("https://mrbeautyvloraiseni.github.io/kasse/fonts/Montserrat-Regular.ttf") format("truetype");font-weight:400;font-style:normal}
@font-face{font-family:"MontserratLocal";src:url("https://mrbeautyvloraiseni.github.io/kasse/fonts/Montserrat-SemiBold.ttf") format("truetype");font-weight:600;font-style:normal}
@font-face{font-family:"MontserratLocal";src:url("https://mrbeautyvloraiseni.github.io/kasse/fonts/Montserrat-Bold.ttf") format("truetype");font-weight:700;font-style:normal}
@font-face{font-family:"Sacramento";src:url("https://mrbeautyvloraiseni.github.io/kasse/fonts/Sacramento-Regular.ttf") format("truetype");font-weight:normal;font-style:normal}
:root{--mr-yellow:#C8CF04}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#000}
body{font-family:"MontserratLocal",Arial,sans-serif;color:#111}
.receiptPage{max-width:760px;min-height:100vh;margin:0 auto;background:#fff;color:#111;padding:26px 24px 26px;font-family:"MontserratLocal";box-sizing:border-box}
.receiptLogo{display:block;margin:0 auto 10px;max-width:157px;width:37.8%;height:auto}
.receiptCompany{text-align:center;font-size:14px;margin-bottom:8px;line-height:1.18}
.receiptDash{border-top:1px dashed #111;margin-bottom:16px}
.receiptTitle{font-size:22px;font-weight:700;letter-spacing:1px;margin-bottom:16px}
.receiptMeta{display:grid;grid-template-columns:minmax(0,1fr) 88px;gap:12px 18px;font-size:15px;margin-bottom:14px}
.receiptMetaGroup{display:grid;grid-template-rows:auto auto;gap:0;min-width:0;line-height:1.08}
.receiptMeta .receiptMetaGroup:nth-child(2),.receiptMeta .receiptMetaGroup:nth-child(4){grid-column:2;justify-self:start}
.receiptMeta .receiptMetaGroup:nth-child(2) .receiptMetaLabel,.receiptMeta .receiptMetaGroup:nth-child(2) .receiptMetaValue,.receiptMeta .receiptMetaGroup:nth-child(4) .receiptMetaLabel,.receiptMeta .receiptMetaGroup:nth-child(4) .receiptMetaValue{text-align:left}
.receiptMetaLabel{white-space:nowrap}
.receiptMetaValue{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;font-weight:700}
.receiptLine{border-top:2px solid #111;margin:14px 0}
.receiptItems{font-size:15px}
.receiptItems b{display:block;margin-bottom:9px;font-size:16px}
.receiptItem{display:grid;grid-template-columns:minmax(0,1fr) 37px 72px;column-gap:4px;align-items:start;margin:7px 0}
.receiptItem .currency{width:37px;text-align:left;justify-self:start;font-weight:400;transform:translateX(25px)}
.receiptItem .amount{text-align:right}
.receiptTotalRow{display:grid;grid-template-columns:minmax(0,1fr) 37px 72px;column-gap:4px;font-size:15px;margin:12px 0 8px}
.receiptTotalRow .currency{width:37px;text-align:left;justify-self:start;font-weight:600;transform:translateX(25px)}
.receiptTotalRow .amount{font-weight:600;text-align:right}
.receiptPayRow{display:grid;grid-template-columns:1fr auto;gap:18px;font-size:15px;margin:0}
.receiptPayRow span:last-child{font-weight:600}
.receiptMwst{font-size:11px;margin-top:-2px;line-height:1}
.receiptThanks{text-align:center;margin-top:3px;color:var(--mr-yellow)}
.receiptHeartImg{display:block;margin:0 auto 3px;width:26px;height:auto}
.receiptThanksText{font-family:"Sacramento",cursive;font-size:24px;margin-top:2px}
.receiptThanksSub{font-size:11px;line-height:1.15;color:#111}
.status{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;color:#fff;padding:30px;font-family:"MontserratLocal"}
.status h1{font-size:24px}.status p{color:#ddd}
@media(max-width:430px){
 .receiptPage{padding:24px 22px 26px}
 .receiptLogo{max-width:144px;width:40.5%;margin-bottom:10px}
 .receiptCompany{font-size:13px;line-height:1.18}
 .receiptTitle{font-size:21px;margin-bottom:14px;font-weight:700}
 .receiptMeta{font-size:14px;gap:12px 16px;grid-template-columns:minmax(0,1fr) 88px}
 .receiptItems{font-size:14px}.receiptItems b{margin-bottom:8px}
 .receiptItem{grid-template-columns:minmax(0,1fr) 37px 72px;gap:4px;margin:7px 0}
 .receiptTotalRow{grid-template-columns:minmax(0,1fr) 37px 72px;gap:4px;font-size:14px}
 .receiptPayRow{font-size:14px}.receiptMwst{font-size:11px}.receiptThanksText{font-size:24px}
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
</head>
<body><div id="app" class="status"><div><h1>Quittung wird geladen…</h1></div></div>
<script>
const firebaseConfig={apiKey:"AIzaSyBeUdo8xgLdwdMh-t2RU5z37Z6LIeZsXTQ",authDomain:"mr-beauty-apps.firebaseapp.com",projectId:"mr-beauty-apps",storageBucket:"mr-beauty-apps.firebasestorage.app"};
firebase.initializeApp(firebaseConfig);const db=firebase.firestore();
function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function fail(title,text){const a=document.getElementById('app');a.className='status';a.innerHTML=`<div><h1>${esc(title)}</h1><p>${esc(text)}</p></div>`}
(async()=>{try{
 const parts=location.pathname.split('/').filter(Boolean),qi=parts.indexOf('q'),token=qi>=0?parts[qi+1]:'';
 if(!/^\d{16}$/.test(token)){fail('Quittung nicht gefunden','Der Link ist unvollständig.');return}
 const snap=await db.collection('public_receipts').doc(token).get();
 if(!snap.exists){fail('Quittung nicht gefunden','Dieser Beleg ist nicht vorhanden.');return}
 const d=snap.data()||{},items=Array.isArray(d.items)?d.items:[];
 const itemHtml=items.map(i=>`<div class="receiptItem"><div>• ${esc(i.name)}</div><div class="currency">CHF</div><div class="amount">${Number(i.price||0).toFixed(2)}</div></div>`).join('');
 const app=document.getElementById('app');app.className='receiptPage';app.innerHTML=`
 <img src="https://mrbeautyvloraiseni.github.io/kasse/logo_quittung.png" class="receiptLogo" alt="MR Beauty">
 <div class="receiptCompany"><div>MR Beauty Vlora Iseni</div><div>Adlikerstrasse 255 | 8105 Regensdorf</div></div>
 <div class="receiptDash"></div>
 <div class="receiptTitle">QUITTUNG</div>
 <div class="receiptMeta">
  <div class="receiptMetaGroup"><div class="receiptMetaLabel">Quittung Nr.:</div><div class="receiptMetaValue">${esc(d.receiptNumber||d.number||'')}</div></div>
  <div class="receiptMetaGroup"><div class="receiptMetaLabel">Datum:</div><div class="receiptMetaValue">${esc(d.date||'')}</div></div>
  <div class="receiptMetaGroup"><div class="receiptMetaLabel">Kundin:</div><div class="receiptMetaValue">${esc((d.customerName||d.name||'').length>30?(d.customerName||d.name||'').slice(0,30)+'…':(d.customerName||d.name||''))}</div></div>
  <div class="receiptMetaGroup"><div class="receiptMetaLabel">Uhrzeit:</div><div class="receiptMetaValue">${esc(d.time||'')}</div></div>
 </div>
 <div class="receiptLine"></div>
 <div class="receiptItems"><b>Leistungen</b>${itemHtml}</div>
 <div class="receiptLine"></div>
 <div class="receiptTotalRow"><span>Betrag:</span><span class="currency">CHF</span><span class="amount">${Number(d.total||0).toFixed(2)}</span></div>
 <div class="receiptPayRow"><span>Zahlungsart:</span><span>${esc(d.payment||'Barzahlung')}</span></div>
 <div class="receiptMwst">Nicht MWST-pflichtig</div>
 <div class="receiptLine"></div>
 <div class="receiptThanks"><img src="https://mrbeautyvloraiseni.github.io/kasse/herz.png" class="receiptHeartImg" alt=""><div class="receiptThanksText">Vielen Dank für Ihren Besuch!</div><div class="receiptThanksSub">Wir freuen uns, Sie bald wieder begrüssen zu dürfen.</div></div>`;
 }catch(e){console.error(e);fail('Quittung konnte nicht geladen werden','Bitte versuchen Sie es später erneut.')}})();
</script></body></html>

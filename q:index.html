function money(v){return Number(v||0).toFixed(2)}
function showError(title,text){document.getElementById('app').innerHTML=`<div class="state"><h1>${esc(title)}</h1><div>${esc(text)}</div></div>`}
function render(d){if(String(d.status||'paid').toLowerCase()!=='paid'){document.getElementById('app').innerHTML=`<div class="page"><img class="logo" src="${LOGO}"><div class="cancelled">Diese Quittung wurde storniert.</div></div>`;return}const items=(d.items||[]).map(i=>`<div class="item"><div>• ${esc(i.name)}</div><div>CHF</div><div>${money(i.price)}</div></div>`).join('');document.getElementById('app').innerHTML=`<div class="page"><img class="logo" src="${LOGO}"><div class="company"><div>MR Beauty Vlora Iseni</div><div>Adlikerstrasse 255 | 8105 Regensdorf</div></div><div class="dash"></div><h1>QUITTUNG</h1><div class="meta"><div><div class="label">Quittung Nr.:</div><div class="value">${esc(d.receiptNumber)}</div></div><div><div class="label">Datum:</div><div class="value">${esc(d.date)}</div></div><div><div class="label">Kundin:</div><div class="value">${esc(d.customerName)}</div></div><div><div class="label">Uhrzeit:</div><div class="value">${esc(d.time)}</div></div></div><div class="line"></div><h2>Leistungen</h2>${items}<div class="line"></div><div class="total"><div>Betrag:</div><strong>CHF</strong><strong>${money(d.total)}</strong></div><div class="pay"><div>Zahlungsart:</div><div></div><strong>${esc(d.payment||'Barzahlung')}</strong></div><div class="mwst">Nicht MWST-pflichtig</div><div class="line"></div><div class="thanks"><div class="heart">♡</div><div class="script">Vielen Dank für Ihren Besuch!</div><div class="sub">Wir freuen uns, Sie bald wieder begrüssen zu dürfen.</div></div></div>`}
(async()=>{const token=tokenFromUrl();if(!token){showError('Quittung nicht gefunden','Der Link ist unvollständig.');return}try{const snap=await db.collection('public_receipts').doc(token).get();if(!snap.exists){showError('Quittung nicht gefunden','Diese Quittung ist nicht vorhanden oder wurde entfernt.');return}render(snap.data())}catch(e){console.error(e);showError('Quittung konnte nicht geladen werden','Bitte versuchen Sie es später erneut.')}})();
</script></body></html>
